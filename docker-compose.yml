services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comfort_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${DB_HOST_PORT:-5432}:5432'
    volumes:
      - comfort_api_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-comfort_api}?schema=public"
      FORCE_HTTPS: ${FORCE_HTTPS:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SWAGGER_PATH: ${SWAGGER_PATH:-docs}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://comfort.example.com}
      WOMPI_BASE_URL: ${WOMPI_BASE_URL:-https://api-sandbox.co.uat.wompi.dev/v1}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-pub_stagtest_g2u0HQd3ZMh05hsSgTS2lUV8t3s4mOt7}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-prv_stagtest_5i0ZGIGiFcDQifYsXxvsny7Y37tKqFWg}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-stagtest_integrity_nAIBuqayW70XpUqJS4qf4STYiISd89Fp}
      WOMPI_ACCEPTANCE_TOKEN: ${WOMPI_ACCEPTANCE_TOKEN:-acceptance_token_from_wompi_sandbox}
      WOMPI_SANDBOX_CARD_TOKEN: ${WOMPI_SANDBOX_CARD_TOKEN:-tok_test_from_wompi_sandbox}
      WOMPI_CUSTOMER_EMAIL: ${WOMPI_CUSTOMER_EMAIL:-sandbox.user@comfort-api.local}
      DB_PUSH_MAX_RETRIES: ${DB_PUSH_MAX_RETRIES:-30}
      DB_PUSH_RETRY_DELAY_SECONDS: ${DB_PUSH_RETRY_DELAY_SECONDS:-2}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${HOST_PORT:-3001}:3000'

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-comfort_api}?schema=public"
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - npm run prisma:generate && npm run prisma:seed
    profiles: ['seed']

volumes:
  comfort_api_pgdata:
